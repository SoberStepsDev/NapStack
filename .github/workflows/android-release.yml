# Build .aab na serwerach GitHub (możesz zamknąć laptop po push + ręcznym starcie workflow).
# Wymagane GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEY_PROPERTIES — pełna treść pliku key.properties
#   ANDROID_KEYSTORE_BASE64 — base64 pliku .jks (np. base64 -i napstack-release.jks | pbcopy)
#   APPWRITE_PROJECT_ID — ID projektu Appwrite (to samo co lokalne .env)
#   RC_PUBLIC_KEY_ANDROID — publiczny klucz SDK RevenueCat (Android)
name: Android release bundle

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Release signing files
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "$ANDROID_KEY_PROPERTIES" ] || [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Ustaw sekrety ANDROID_KEY_PROPERTIES i ANDROID_KEYSTORE_BASE64." >&2
            exit 1
          fi
          printf '%s\n' "$ANDROID_KEY_PROPERTIES" > android/key.properties
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/napstack-upload.jks
          ls -lh android/app/napstack-upload.jks

      - name: Build app bundle
        env:
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          RC_PUBLIC_KEY_ANDROID: ${{ secrets.RC_PUBLIC_KEY_ANDROID }}
        run: |
          set -e
          if [ -z "$APPWRITE_PROJECT_ID" ] || [ -z "$RC_PUBLIC_KEY_ANDROID" ]; then
            echo "Ustaw sekrety APPWRITE_PROJECT_ID i RC_PUBLIC_KEY_ANDROID w repozytorium." >&2
            exit 1
          fi
          flutter build appbundle --release \
            --dart-define=APPWRITE_PROJECT_ID="$APPWRITE_PROJECT_ID" \
            --dart-define=RC_PUBLIC_KEY_ANDROID="$RC_PUBLIC_KEY_ANDROID"

      - uses: actions/upload-artifact@v4
        with:
          name: napstack-release-aab
          path: build/app/outputs/bundle/release/*.aab
