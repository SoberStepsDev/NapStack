<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NapStack</title>
  <style>
    :root {
      --bg: #0d1120;
      --card: #111827;
      --text: #e8eef8;
      --muted: #8899bb;
      --accent: #60c5ff;
      --border: #1e2f47;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      font-size: 1rem;
      padding: 1.5rem;
      max-width: 44rem;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 0.75rem 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    a:hover {
      background: var(--border);
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>🌙 NapStack</h1>
  <p style="text-align: center; color: var(--muted);">Nap timers, alarms, stats. Available on Google Play.</p>

  <h2 style="text-align: center; margin-top: 2rem;">Legal & Privacy</h2>
  <ul style="text-align: center;">
    <li><a href="privacy_pl.html">Polityka prywatności (PL)</a></li>
    <li><a href="privacy_en.html">Privacy Policy (EN)</a></li>
  </ul>

  <footer>
    <p>© 2026 NapStack. All rights reserved.</p>
  </footer>
</body>
</html>
