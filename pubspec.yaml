name: napstack
description: Inteligentne zarządzanie drzemkami z synchronizacją Appwrite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Appwrite ---
  appwrite: 23.0.0

  # --- State management ---
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # --- UI ---
  google_fonts: ^8.0.2
  intl: ^0.20.2

  # --- Nawigacja ---
  go_router: ^17.2.0

  # --- Alarmy systemowe ---
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

  # --- Zakupy ---
  purchases_flutter: ^9.16.1

  # --- Narzędzia ---
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  wakelock_plus: ^1.5.1
  uuid: ^4.5.3
  freezed_annotation: ^3.1.0
  url_launcher: ^6.3.2
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  flutter_native_splash: ^2.4.6

flutter_native_splash:
  color: "#070B16"
  image: assets/brand/napstack_icon_512.png
  android: true
  ios: false
  web: false
  android_12:
    color: "#070B16"
    icon_background_color: "#070B16"
    image: assets/brand/napstack_icon_512.png

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/legal/
    - assets/brand/
